name: Selenium CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your GitHub repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.13
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 3. Install Chrome on the GitHub Linux runner
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get -fy install

      # 4. Install Python dependencies
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest pytest-html webdriver-manager

      # 5. Run Selenium tests in headless mode
      - name: Run Selenium tests
        run: |
          pytest -v \
            --html=selenium_report.html \
            --self-contained-html

      # 6. Upload the HTML report as an artifact
      - name: Upload Selenium Report
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: selenium_report.html
